# FILE: .github/workflows/sync_memory.yml
name: 🧠 Sync Repo Memory to Gist

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  sync_gist:
    runs-on: ubuntu-latest
    steps:
      - name: Kéo mã nguồn về
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Lấy toàn bộ lịch sử để phân tích recent changes

      - name: Cài đặt Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cài thư viện
        run: |
          pip install requests pyyaml
          # Nếu repo có requirements.txt, cài để phân tích dependency
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Tạo và đẩy Repo Memory lên Gist
        env:
          GITHUB_TOKEN: ${{ secrets.GIST_UPDATE_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/export_memory.py
