name: 🧠 Auto Export Repo Memory to Gist

# 1. ĐIỀU KIỆN KÍCH HOẠT (Khi nào thì thức dậy?)
on:
  push:
    branches: 
      - main
      - master  # Lắng nghe cả nhánh master nếu có
  workflow_dispatch:    # Cho phép Giám đốc bấm nút "Run workflow" chạy bằng tay trên web

# 2. CÔNG VIỆC CẦN LÀM (Làm những gì?)
jobs:
  sync_to_gist:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Kéo mã nguồn về máy chủ chạy tự động
        uses: actions/checkout@v4

      - name: 🐍 Cài đặt môi trường Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Cài đặt thư viện yêu cầu
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 🚀 Chạy kịch bản xuất Bộ nhớ Repo
        env:
          # Lấy các biến môi trường từ két sắt (GitHub Secrets)
          GIST_ID: ${{ secrets.GIST_ID }}
          
          # Lưu ý: Token này phải là Personal Access Token (PAT) có quyền 'gist'
          GITHUB_TOKEN: ${{ secrets.GIST_UPDATE_TOKEN }} 
        
        # Sửa lại đường dẫn này nếu file export_memory.py nằm ở thư mục khác
        run: python export_memory.py 
