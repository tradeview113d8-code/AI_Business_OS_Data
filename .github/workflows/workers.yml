name: AI Core Workers

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  workers:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: 1. Task Analyzer
        timeout-minutes: 3
        env:
          MONGO_URI:  ${{ secrets.MONGO_URI }}
          DB_NAME:    "business_os_v5"
          ADMIN_IDS:  ${{ secrets.ADMIN_IDS }}
        run: python Workers/task_analyzer.py

      - name: 2. Report Writer
        timeout-minutes: 3
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          DB_NAME:   "business_os_v5"
        run: python Workers/report_writer.py

      - name: 3. Report Exporter
        timeout-minutes: 3
        env:
          MONGO_URI:    ${{ secrets.MONGO_URI }}
          DB_NAME:      "business_os_v5"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OWNER: "tradeview113d8-code"
          GITHUB_REPO:  "AI_Business_OS_Data"
          MOCK_MODE:    "false"
        run: python Workers/report_exporter.py

      - name: 4. GitHub Sync
        timeout-minutes: 2
        env:
          MONGO_URI:    ${{ secrets.MONGO_URI }}
          DB_NAME:      "business_os_v5"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OWNER: "tradeview113d8-code"
          GITHUB_REPO:  "AI_Business_OS_Data"
          MOCK_MODE:    "false"
        run: |
          timeout 90 python Workers/github_sync.py || echo "github_sync timeout - skipping"

      - name: 5. Health Monitor
        timeout-minutes: 2
        env:
          MONGO_URI:      ${{ secrets.MONGO_URI }}
          DB_NAME:        "business_os_v5"
          GITHUB_TOKEN:   ${{ secrets.GITHUB_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: python Workers/health_monitor.py

      - name: 6. Cleaner
        timeout-minutes: 2
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          DB_NAME:   "business_os_v5"
        run: python Workers/cleaner.py

      - name: 7. Telegram Notifier
        timeout-minutes: 2
        env:
          MONGO_URI:      ${{ secrets.MONGO_URI }}
          DB_NAME:        "business_os_v5"
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          ADMIN_IDS:      ${{ secrets.ADMIN_IDS }}
        run: python Workers/notifier.py
